<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    transition: 0.3s;
  }

  .light-mode {
    background: #f1f5f9;
    color: #111;
  }

  .container {
    padding: 30px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  h1 {
    font-size: 36px;
  }

  .toggle {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 16px;
  }

  .light-mode .toggle {
    background: #ddd;
    color: #111;
  }

  .dashboard {
    display: flex;
    margin-top: 30px;
    gap: 20px;
  }

  .sidebar {
    width: 250px;
    height: 400px;
    border-radius: 20px;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .cards {
    display: flex;
    gap: 20px;
  }

  .card {
    width: 200px;
    height: 150px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    transition: 0.3s;
  }

  .card:hover {
    transform: scale(1.05);
  }

  .light-mode .sidebar,
  .light-mode .card {
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }
</style>
</head>

<body id="body">

<div class="container">

  <div class="header">
    <h1>Admin Dashboard</h1>
    <button class="toggle" onclick="toggleMode()">☀️ Light Mode</button>
  </div>

  <div class="dashboard">
    
    <div class="sidebar">
      Navigation
    </div>

    <div class="cards">
      <div class="card">Analytics</div>
      <div class="card">Users</div>
      <div class="card">Settings</div>
    </div>

  </div>

</div>

<script>
function toggleMode() {
  const body = document.getElementById("body");
  body.classList.toggle("light-mode");
}
</script>

</body>
</html>
