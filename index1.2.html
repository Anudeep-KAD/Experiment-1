<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bank UI</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e6e6e6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: #f5f5f5;
    padding: 40px;
    border-radius: 15px;
    width: 500px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  h1 {
    font-size: 48px;
    margin-bottom: 30px;
  }

  label {
    font-size: 24px;
    display: block;
    text-align: left;
    margin-bottom: 10px;
  }

  input {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
    border: 2px solid #ccc;
    margin-bottom: 25px;
  }

  .buttons {
    display: flex;
    justify-content: space-between;
  }

  button {
    width: 45%;
    padding: 15px;
    font-size: 22px;
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
  }

  .deposit {
    background: linear-gradient(to right, #1e5eff, #0047cc);
  }

  .withdraw {
    background: linear-gradient(to right, #ff3b3b, #cc0000);
  }

  button:hover {
    opacity: 0.9;
  }

  .error {
    color: red;
    font-size: 24px;
    margin-top: 20px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Balance: $<span id="balance">1000</span></h1>

  <label>Amount</label>
  <input type="number" id="amount" placeholder="Enter amount">

  <div class="buttons">
    <button class="deposit" onclick="deposit()">Deposit</button>
    <button class="withdraw" onclick="withdraw()">Withdraw</button>
  </div>

  <div id="error" class="error"></div>
</div>

<script>
let balance = 1000;

function deposit() {
  let amount = parseFloat(document.getElementById("amount").value);
  let error = document.getElementById("error");

  if (isNaN(amount) || amount <= 0) {
    error.innerText = "Invalid amount!";
    return;
  }

  balance += amount;
  updateUI();
}

function withdraw() {
  let amount = parseFloat(document.getElementById("amount").value);
  let error = document.getElementById("error");

  if (isNaN(amount) || amount <= 0 || amount > balance) {
    error.innerText = "Invalid amount!";
    return;
  }

  balance -= amount;
  updateUI();
}

function updateUI() {
  document.getElementById("balance").innerText = balance;
  document.getElementById("amount").value = "";
  document.getElementById("error").innerText = "";
}
</script>

</body>
</html>
